name: Verifica CI / CD

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  verify:
    name: Verifica Compilazione e Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v3

      - name: Configurazione Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Installazione Dipendenze
        run: npm ci

      - name: Controllo Codice (Lint / Type Check)
        run: npm run lint

      - name: Test Compilazione Produzione
        run: npm run build
