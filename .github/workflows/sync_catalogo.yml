name: Sincronizzazione Stock AutoScout24

on:
  schedule:
    # Esegue tre volte al giorno ad orari non canonici per ridurre i ritardi di GitHub Actions:
    # 06:23 UTC (08:23 CEST/Italiano)
    # 12:23 UTC (14:23 CEST/Italiano)
    # 18:23 UTC (20:23 CEST/Italiano)
    - cron: '23 6,12,18 * * *'
  workflow_dispatch: # Permette anche l'esecuzione manuale da GitHub

jobs:
  sync:
    name: Sincronizza ed Aggiorna Catalogo
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configurazione Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Esecuzione Scraper (fetch_cars.js)
        run: node fetch_cars.js

      - name: Commit e Push delle modifiche riscontrate
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/auto_catalogo.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "sync: aggiornato stock auto da AutoScout24 [bypass ci]" && git push)
